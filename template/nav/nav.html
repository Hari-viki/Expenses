{% load static %}

<header>
  <nav class="navbar">
    <div class="nav-inner">

      <!-- Brand -->
      <a href="{% url 'home' %}" class="brand">
        <div class="brand-dot"></div>
        <span class="brand-name">Expenses</span>
      </a>

      <!-- Desktop Navigation -->
      <ul class="nav-links">
        {% if request.user.is_authenticated %}
          <li><a href="{% url 'home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a></li>
          <li><a href="{% url 'expenses' %}" class="nav-link {% if request.resolver_match.url_name == 'expenses' %}active{% endif %}">Expenses</a></li>
          <!-- <li><a href="{% url 'bike_expenses' %}" class="nav-link {% if request.resolver_match.url_name == 'bike_expenses' %}active{% endif %}">Bike Expenses</a></li> -->
          <li><a href="{% url 'logout' %}" class="nav-link logout-link">Logout</a></li>
        {% else %}
          <li><a href="{% url 'login' %}" class="nav-link {% if request.resolver_match.url_name == 'login' %}active{% endif %}">Login</a></li>
          <li><a href="{% url 'signup' %}" class="nav-link {% if request.resolver_match.url_name == 'signup' %}active{% endif %}">Signup</a></li>
        {% endif %}
      </ul>

      <!-- Hamburger Button (mobile only) -->
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu">
    {% if request.user.is_authenticated %}
      <a href="{% url 'home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
      <a href="{% url 'expenses' %}" class="nav-link {% if request.resolver_match.url_name == 'expenses' %}active{% endif %}">Expenses</a>
      <!-- <a href="{% url 'bike_expenses' %}" class="nav-link {% if request.resolver_match.url_name == 'bike_expenses' %}active{% endif %}">Bike Expenses</a> -->
      <a href="{% url 'logout' %}" class="nav-link logout-link">Logout</a>
    {% else %}
      <a href="{% url 'login' %}" class="nav-link {% if request.resolver_match.url_name == 'login' %}active{% endif %}">Login</a>
      <a href="{% url 'signup' %}" class="nav-link {% if request.resolver_match.url_name == 'signup' %}active{% endif %}">Signup</a>
    {% endif %}
  </div>
</header>

<script>
  const hamburgerBtn = document.getElementById('hamburger-btn');
  const mobileMenu = document.getElementById('mobile-menu');

  hamburgerBtn.addEventListener('click', function () {
    const isOpen = mobileMenu.classList.toggle('open');
    hamburgerBtn.classList.toggle('active', isOpen);
  });
</script>
